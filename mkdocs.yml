site_name: TBT个人网站
site_url: https://tianbaiting.github.io/

theme:
  name: material
  language: zh  # 中文，解决中文搜索问题
  custom_dir: overrides
  palette:
    primary: 'indigo'
    accent: 'pink'
    scheme: 'default'  # default, slate, solarized-light, solarized-dark
  font:
    text: Roboto
    code: Roboto Mono

  features:
    # - navigation.expand
    - tabs
    - content.tabs.link
    - search.highlight
    - navigation.top
    - navigation.tracking
    - navigation.tabs
    - navigation.indexes
    - search.share


markdown_extensions:
  - codehilite:
      guess_lang: false
      linenums: true  # 启用行号
  - attr_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed
  - nl2br
  - toc:
      permalink: '#'
      slugify: !!python/name:pymdownx.slugs.uslugify
  - admonition
  - footnotes
  - meta
  - def_list
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist
  - pymdownx.tilde

# extra_files:
#   - docs/google0ec64d869ee59589.html
#   - docs/robots.txt


plugins:
  - i18n:
      languages:
        - locale: zh
          name: 简体中文
          default: true
          build: true
        - locale: en
          name: English
          build: true
  - search
  - roamlinks
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      enable_parallel_processing: false
  - exclude:
      glob:
        - "*.tmp"
        - "*.pdf"
        - "*.gz"
      regex:
        - '.*\.(tmp|bin|tar)$'


extra_javascript:
  - js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://d3js.org/d3.v7.min.js
  - js/scheme.js
  - js/graph.js
  

extra_css:
  - css/counter.css
  - css/graph.css

extra:
  alternate:
    - name: 简体中文
      link: /
      lang: zh
    - name: English
      link: /en/
      lang: en

